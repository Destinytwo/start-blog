<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">车载终端测试链路总览</title>
  <desc id="desc">TBOX、定位、总线、网络、平台、诊断和 ECALL 的测试链路示意图。</desc>
  <rect width="1200" height="640" fill="#F7FAFC"/>
  <rect x="48" y="48" width="1104" height="544" rx="30" fill="#FFFFFF" stroke="#D7E2EA" stroke-width="2"/>

  <text x="96" y="112" fill="#132033" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700">车载终端测试链路总览</text>
  <text x="96" y="154" fill="#526173" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="22">围绕 TBOX 状态机，把定位、通信、平台上报、诊断和异常恢复串成可复查流程。</text>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="482" y="230" width="236" height="150" rx="24" fill="#123B4A"/>
    <text x="600" y="292" text-anchor="middle" fill="#FFFFFF" font-size="34" font-weight="700">TBOX</text>
    <text x="600" y="330" text-anchor="middle" fill="#BDE9F2" font-size="20">状态机 / 日志 / 缓存</text>

    <rect x="104" y="218" width="210" height="82" rx="18" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
    <text x="209" y="254" text-anchor="middle" fill="#047857" font-size="24" font-weight="700">GNSS 定位</text>
    <text x="209" y="281" text-anchor="middle" fill="#315B50" font-size="17">首定位 / 漂移 / 辅助定位</text>

    <rect x="104" y="374" width="210" height="82" rx="18" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
    <text x="209" y="410" text-anchor="middle" fill="#1D4ED8" font-size="24" font-weight="700">CAN / CANFD</text>
    <text x="209" y="437" text-anchor="middle" fill="#3A5274" font-size="17">首帧 / 周期 / 唤醒帧</text>

    <rect x="890" y="218" width="210" height="82" rx="18" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
    <text x="995" y="254" text-anchor="middle" fill="#C2410C" font-size="24" font-weight="700">运营平台</text>
    <text x="995" y="281" text-anchor="middle" fill="#72513A" font-size="17">定位 / SOS / 质检 / 故障</text>

    <rect x="890" y="374" width="210" height="82" rx="18" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="2"/>
    <text x="995" y="410" text-anchor="middle" fill="#6D28D9" font-size="24" font-weight="700">诊断与 ECALL</text>
    <text x="995" y="437" text-anchor="middle" fill="#584A73" font-size="17">DOIP / 会话 / 白名单</text>

    <rect x="430" y="462" width="340" height="76" rx="20" fill="#FEFCE8" stroke="#EAB308" stroke-width="2"/>
    <text x="600" y="497" text-anchor="middle" fill="#854D0E" font-size="23" font-weight="700">测试证据</text>
    <text x="600" y="524" text-anchor="middle" fill="#6B5A2E" font-size="17">终端日志 · 总线抓包 · 平台回传 · 回归记录</text>
  </g>

  <g stroke="#607185" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M314 259H462"/>
    <path d="M314 415H462"/>
    <path d="M718 259H870"/>
    <path d="M718 415H870"/>
    <path d="M600 380V462"/>
  </g>
  <g fill="#607185">
    <path d="M462 259L448 251V267L462 259Z"/>
    <path d="M462 415L448 407V423L462 415Z"/>
    <path d="M870 259L856 251V267L870 259Z"/>
    <path d="M870 415L856 407V423L870 415Z"/>
    <path d="M600 462L592 448H608L600 462Z"/>
  </g>
</svg>
